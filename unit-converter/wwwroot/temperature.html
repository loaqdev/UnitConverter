<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter - Temperature</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/scripts/converter.js" defer></script>
</head>
<body>
    <div class="content">
        <header>
            <h2>Unit Converter</h2>
            <nav class="link-container">
                <a href="length.html">Length</a>
                <a href="weight.html">Weight</a>
                <a href="temperature.html" class="active">Temperature</a>
            </nav>
        </header>

        <form id="converterForm">
            <div class="form-group">
                <label for="inputValue">Enter value to convert:</label>
                <input class="input-unit"
                       type="number"
                       id="inputValue"
                       placeholder="0.00"
                       step="any"
                       required>
                <input type="hidden" id="conversionType" value="temperature">
            </div>

            <div class="form-group">
                <label>From / To:</label>
                <div class="select-container">
                    <select id="unitFrom">
                        <option value="c">Celsius (°C)</option>
                        <option value="f">Fahrenheit (°F)</option>
                        <option value="k">Kelvin (K)</option>
                    </select>
                    <span class="arrow">→</span>
                    <select id="unitTo">
                        <option value="c">Celsius (°C)</option>
                        <option value="f" selected>Fahrenheit (°F)</option>
                        <option value="k">Kelvin (K)</option>
                    </select>
                </div>
            </div>

            <div class="buttons">
                <button type="submit" class="button btn-submit">Convert</button>
                <button type="reset" class="button btn-reset">Clear</button>
            </div>

            <h3 id="resultLabel" class="result">Result: -</h3>
        </form>
    </div>
</body>
</html>
